# ──────────────────────────────────────────────────────────────────────────────
# Elle-Ann ESI v3.0 — CI Pipeline
#
# Runs on every push / PR touching the C++ tree and on manual dispatch.
# Enforces the audit bar automatically — not just "does it compile".
#
# What it does:
#   1. Checks out the repo.
#   2. Sets up MSBuild via microsoft/setup-msbuild.
#   3. Downloads Lua 5.4.6 source into Lua/lua54 (matches Option A in BUILD_VS.md).
#   4. Runs MSBuild for both Debug|x64 and Release|x64 honouring
#      Directory.Build.props (Level4 + TreatWarningAsError).
#   5. Uploads Deploy/Release/x64 as a build artifact.
#   6. Runs separate static-hygiene jobs that would otherwise be discovered
#      by a human reviewer too late:
#        - .sln ↔ .vcxproj cross-reference + XML well-formedness
#        - C++ brace/paren balance (string & comment aware)
#        - PowerShell parser syntax check on all Deploy/*.ps1
#        - SQL delta idempotency guard (every ALTER/CREATE must be wrapped
#          in IF NOT EXISTS)
#
# What it does NOT do:
#   - Start SQL Server / ODBC / run the actual services. Those require
#     ElleCore/ElleHeart/ElleSystem databases and a live MSSQL instance —
#     out of scope for a pure compile-check CI.
# ──────────────────────────────────────────────────────────────────────────────
name: ElleAnn Build

on:
  push:
    branches: [ main, master, develop ]
    paths:
      - 'ElleAnn/**'
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/**'
  pull_request:
    paths:
      - 'ElleAnn/**'
      - 'frontend/**'
      - 'backend/**'
      - '.github/workflows/**'
  workflow_dispatch:

env:
  SOLUTION: ElleAnn/ElleAnn.sln
  LUA_VERSION: '5.4.6'
  # SHA-256 as published by lua.org in their authoritative FTP index
  # (https://www.lua.org/ftp/, column "checksum (sha256)"). This is the
  # upstream-authoritative integrity value. When bumping LUA_VERSION
  # this hash MUST be updated in the same PR or the `Download Lua`
  # step will fail closed.
  LUA_SHA256: '7d5ea1b9cb6aa0b59ca3dde1c6adcb57ef83a1ba8e5432c0ecd06bf439b3ad88'

jobs:
  build:
    name: Build ${{ matrix.configuration }} | x64
    runs-on: windows-2022
    strategy:
      fail-fast: false
      matrix:
        configuration: [Debug, Release]

    steps:
      # ───────────────────────────────────────────────────────────
      # Checkout
      # ───────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      # ───────────────────────────────────────────────────────────
      # MSBuild — uses the VS 2022 install on the runner (17.x, v143).
      # ───────────────────────────────────────────────────────────
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2
        with:
          msbuild-architecture: x64

      # ───────────────────────────────────────────────────────────
      # Lua 5.4 — cache the tarball so subsequent runs skip the download.
      # The Elle.Lua.Behavioral.vcxproj auto-detects sources under
      # Lua/lua54/src and compiles them inline; no prebuilt binary needed.
      # ───────────────────────────────────────────────────────────
      - name: Cache Lua source
        id: cache-lua
        uses: actions/cache@v5
        with:
          path: ElleAnn/Lua/lua54
          key: lua-${{ env.LUA_VERSION }}

      - name: Download Lua ${{ env.LUA_VERSION }}
        if: steps.cache-lua.outputs.cache-hit != 'true'
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $url  = "https://www.lua.org/ftp/lua-$env:LUA_VERSION.tar.gz"
          $dest = "$env:RUNNER_TEMP/lua.tgz"
          Invoke-WebRequest $url -OutFile $dest
          # Supply-chain integrity check against the SHA-256 published
          # by lua.org in https://www.lua.org/ftp/. A silent MITM or
          # lua.org compromise would otherwise feed arbitrary C into
          # our build.
          $got = (Get-FileHash $dest -Algorithm SHA256).Hash.ToLower()
          $want = '${{ env.LUA_SHA256 }}'.ToLower()
          if ($got -ne $want) {
            Write-Host "::error::Lua tarball SHA-256 mismatch"
            Write-Host "  got : $got"
            Write-Host "  want: $want"
            exit 1
          }
          Write-Host "Lua tarball SHA-256 verified: $got"
          New-Item -ItemType Directory -Force -Path ElleAnn/Lua/lua54 | Out-Null
          tar -xzf $dest -C "$env:RUNNER_TEMP"
          Copy-Item "$env:RUNNER_TEMP/lua-$env:LUA_VERSION/src" -Destination ElleAnn/Lua/lua54 -Recurse
          Write-Host "Lua source installed at ElleAnn/Lua/lua54/src"
          Get-ChildItem ElleAnn/Lua/lua54/src -Filter '*.c' | Measure-Object | Select-Object -ExpandProperty Count

      # ───────────────────────────────────────────────────────────
      # NuGet restore — no NuGet packages in use right now, but this is
      # harmless and future-proof for when/if we add one.
      # ───────────────────────────────────────────────────────────
      - name: Restore NuGet (if any)
        shell: pwsh
        continue-on-error: true
        run: |
          if (Test-Path 'ElleAnn/packages.config') {
            nuget restore $env:SOLUTION
          } else {
            Write-Host "No NuGet packages to restore."
          }

      # ───────────────────────────────────────────────────────────
      # Build.
      #
      # We DO NOT pass /p:WarningLevel — Directory.Build.props sets
      # Level4 + TreatWarningAsError for the whole solution and CI must
      # honour that (a previous revision overrode with WarningLevel=3
      # which silently lowered the bar on every PR).
      # ───────────────────────────────────────────────────────────
      - name: Build ${{ matrix.configuration }} x64
        shell: pwsh
        run: |
          msbuild $env:SOLUTION `
            /m `
            /nologo `
            /p:Configuration=${{ matrix.configuration }} `
            /p:Platform=x64 `
            /v:minimal `
            /clp:ErrorsOnly`;Summary `
            /fl1 /flp1:LogFile=msbuild-warnings.log`;WarningsOnly`;NoSummary

      # ───────────────────────────────────────────────────────────
      # Warning visibility: /WX makes warnings fatal, so a green build
      # shouldn't carry any — but the vendored Lua opt-out (Level3, no
      # /WX) and any future relaxations mean warnings CAN slip in without
      # breaking the build. File-logger captures them; this step echoes
      # the count to the job summary and uploads the full log as an
      # artifact so reviewers can audit residual warnings without spelunking
      # through 3 minutes of MSBuild output.
      # ───────────────────────────────────────────────────────────
      - name: Surface residual warnings
        if: always() && matrix.configuration == 'Release'
        shell: pwsh
        run: |
          if (Test-Path msbuild-warnings.log) {
              $lines = Get-Content msbuild-warnings.log
              $count = ($lines | Where-Object { $_ -match ': warning ' }).Count
              Write-Host "::notice::MSBuild emitted $count residual warning(s) (non-fatal under /WX opt-outs)."
              "## MSBuild residual warnings: $count" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
              if ($count -gt 0) {
                  "``````" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
                  $lines | Select-Object -First 50 | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
                  "``````" | Out-File -FilePath $env:GITHUB_STEP_SUMMARY -Append
              }
          } else {
              Write-Host "::notice::No warning log produced."
          }

      - name: Upload warning log
        if: always() && matrix.configuration == 'Release'
        uses: actions/upload-artifact@v5
        with:
          name: msbuild-warnings-${{ github.sha }}
          path: msbuild-warnings.log
          retention-days: 14
          if-no-files-found: ignore

      # ───────────────────────────────────────────────────────────
      # Collect binaries into an artifact. Only Release is uploaded —
      # Debug is huge and primarily useful on the machine that built it.
      # ───────────────────────────────────────────────────────────
      - name: List build output
        if: matrix.configuration == 'Release'
        shell: pwsh
        run: |
          Get-ChildItem ElleAnn/Deploy/Release/x64 | Format-Table Name, Length, LastWriteTime

      - name: Upload Release binaries
        if: matrix.configuration == 'Release'
        uses: actions/upload-artifact@v5
        with:
          name: ElleAnn-Release-x64-${{ github.sha }}
          path: ElleAnn/Deploy/Release/x64/
          retention-days: 14
          if-no-files-found: error

  # ────────────────────────────────────────────────────────────────────────
  # Embedding novelty unit test — builds and runs the standalone hashed-
  # trigram test on Linux in ~5s. Catches regressions to the novelty
  # signal's core properties (determinism, self-cosine, morphological
  # clustering) without needing a full MSBuild pass on Windows.
  # ────────────────────────────────────────────────────────────────────────
  embedding-novelty-test:
    name: ElleEmbedding Novelty Unit Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Build + run novelty test
        run: |
          cd ElleAnn/Debug
          g++ -std=c++17 -O2 -Wall -Wextra -Werror \
              -I../Shared \
              ../Shared/ElleEmbedding.cpp \
              test_embedding_novelty.cpp \
              -o test_embedding_novelty
          ./test_embedding_novelty

  # ────────────────────────────────────────────────────────────────────────
  # MSBuild /WX regression canary — runs on Linux in <1s BEFORE the slow
  # Windows MSBuild job. Catches the narrow set of pattern-level latent
  # bugs that cost us three manual back-and-forth rounds to surface:
  #
  #   1. Bare `(uint32_t)22xx /* IPC_X_* */` casts fed into
  #      `ElleIPCMessage::Create(ELLE_IPC_MSG_TYPE, …)` — implicit enum
  #      narrowing that /WX rejects as C2664.
  #   2. `std::filesystem::path::u8string()` feeding `vector<string>` init
  #      lists or `json` values — C++20 made u8string return std::u8string,
  #      not std::string, so the implicit conversion broke under /WX.
  #   3. Bare `::tolower` / `::toupper` passed to `std::transform(...)` —
  #      instantiates the algorithm template with int→char inside the STL,
  #      firing C4244 at <algorithm>(…) under /WX. Use the unsigned-char
  #      lambda form instead.
  #
  # All three were real fixes in Feb 2026; any reintroduction breaks the
  # CI inside ~1s instead of 3min of MSBuild on Windows. Whitelist lives
  # entirely in this grep — no separate config file to drift out of sync.
  # ────────────────────────────────────────────────────────────────────────
  wx-pattern-canary:
    name: MSBuild /WX Pattern Canary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Scan for known /WX-breaking patterns
        run: |
          set -u
          SCAN_DIRS=(ElleAnn/Shared ElleAnn/Services ElleAnn/Lua/Elle.Lua.Behavioral)
          exit_code=0

          echo "::group::Pattern 1 — (uint32_t)22NN IPC opcode casts"
          HITS_1=$(grep -rn --include='*.cpp' --include='*.h' \
              -E '\(uint32_t\)22[0-9][0-9]' "${SCAN_DIRS[@]}" 2>/dev/null || true)
          if [ -n "$HITS_1" ]; then
              echo "::error::Bare (uint32_t)22NN found — cast as (ELLE_IPC_MSG_TYPE)22NN instead."
              echo "$HITS_1"
              exit_code=1
          else
              echo "clean"
          fi
          echo "::endgroup::"

          echo "::group::Pattern 2 — .u8string() in vector<string>/json init lists"
          # Any .u8string() inside a brace-init-list is suspicious. We
          # allow .u8string() only when it's fed into a .c_str() call (e.g.
          # for printf logging), which is already narrowed to the caller's
          # encoding expectation.
          HITS_2=$(grep -rn --include='*.cpp' --include='*.h' \
              -E '\.u8string\(\)' "${SCAN_DIRS[@]}" 2>/dev/null \
              | grep -vE '\.u8string\(\)\.c_str\(\)' || true)
          if [ -n "$HITS_2" ]; then
              echo "::error::.u8string() outside .c_str() context — use .string() for string-typed sinks."
              echo "$HITS_2"
              exit_code=1
          else
              echo "clean"
          fi
          echo "::endgroup::"

          echo "::group::Pattern 3 — std::transform(..., ::tolower/::toupper)"
          HITS_3=$(grep -rn --include='*.cpp' --include='*.h' \
              -E 'std::transform\([^)]*,\s*::(tolower|toupper)\s*\)' \
              "${SCAN_DIRS[@]}" 2>/dev/null || true)
          if [ -n "$HITS_3" ]; then
              echo "::error::Bare ::tolower/::toupper in std::transform — use [](unsigned char c){return (char)std::tolower(c);} lambda."
              echo "$HITS_3"
              exit_code=1
          else
              echo "clean"
          fi
          echo "::endgroup::"

          exit $exit_code

  # ────────────────────────────────────────────────────────────────────────
  # catch(...) total prohibition canary
  #
  #   Rule (locked-in Feb 2026 round 2 audit):
  #     catch(...) is forbidden anywhere in ElleAnn/Shared or
  #     ElleAnn/Services. Every exception is either std::exception (and
  #     caught by name) or it's a non-std crash (SEH / foreign runtime /
  #     raw `throw 42`) that MUST terminate the process so SCM restarts
  #     the service and Windows Event Log records the cause.
  #
  #   Why the prohibition is absolute:
  #     Previous policy was "catch(...) allowed at top-of-thread
  #     boundaries with a comment". In practice this became a weasel-
  #     word: every site grew a "boundary" comment and the rule
  #     degenerated to meaningless. A total ban has no ambiguity.
  #
  #   If a legitimate exception needs catching at a boundary, it MUST
  #   be caught by std::exception type. Non-std throws are bugs and
  #   should crash loudly.
  # ────────────────────────────────────────────────────────────────────────
  catch-all-discipline-canary:
    name: catch(...) Total Prohibition Canary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Forbid catch(...) anywhere in our code
        run: |
          set -u
          python3 <<'PY'
          import pathlib, re, sys
          roots = ["ElleAnn/Shared", "ElleAnn/Services"]
          pat = re.compile(r'(?<!\w)catch\s*\(\s*\.\.\.\s*\)')
          violations = []
          for root in roots:
              for p in pathlib.Path(root).rglob("*"):
                  if p.suffix not in (".cpp", ".h"): continue
                  try:    lines = p.read_text().splitlines()
                  except Exception: continue
                  for i, ln in enumerate(lines):
                      if not pat.search(ln): continue
                      stripped = ln.lstrip()
                      # Skip pure comment lines that just *mention* catch(...)
                      if stripped.startswith("//") or stripped.startswith("*") or stripped.startswith("/*"):
                          continue
                      violations.append(f"{p}:{i+1}: {ln.rstrip()}")
          if violations:
              print("::error::catch(...) is forbidden. Catch std::exception by name, or let it propagate:")
              for v in violations: print("  " + v)
              sys.exit(1)
          print("ok — zero catch(...) in code paths")
          PY

  # ────────────────────────────────────────────────────────────────────────
  # Raw Sleep() ban in worker/service paths
  #
  #   Rule: `Sleep(N)` is not allowed in ElleAnn/Shared or
  #   ElleAnn/Services code. Use one of:
  #     - ElleServiceBase::InterruptibleSleep(ms)   — services
  #     - ElleWait::PollingSleep(ms, m_running)     — shared workers
  #     - ElleWait::PollingSleepUntilSet(ms, cancel) — cancel-flag workers
  #     - WaitForSingleObject(handle, ms)           — one-shot CLI/admin
  #
  #   Raw Sleep blocks for its full duration regardless of shutdown
  #   signals, which is how Windows SCM "service did not respond in a
  #   timely fashion" warnings happen and how slow clean-shutdown
  #   regressions creep in.
  # ────────────────────────────────────────────────────────────────────────
  no-raw-sleep-canary:
    name: No Raw Sleep() in Worker/Service Paths
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Forbid raw Sleep() in code paths
        run: |
          set -u
          python3 <<'PY'
          import pathlib, re, sys
          roots = ["ElleAnn/Shared", "ElleAnn/Services"]
          # Bare Sleep( — NOT preceded by a word char (excludes
          # InterruptibleSleep, PollingSleep, ::Sleep on explicit types).
          pat = re.compile(r'(?<![A-Za-z0-9_:])Sleep\s*\(')
          # Whitelist: ElleWait.h DEFINES the helper, which legitimately
          # wraps the Win32 Sleep to implement PollingSleep.
          WHITELIST = {"ElleAnn/Shared/ElleWait.h"}
          violations = []
          for root in roots:
              for p in pathlib.Path(root).rglob("*"):
                  if p.suffix not in (".cpp", ".h"): continue
                  key = str(p).replace("\\", "/")
                  if key in WHITELIST: continue
                  try:    lines = p.read_text().splitlines()
                  except Exception: continue
                  for i, ln in enumerate(lines):
                      if not pat.search(ln): continue
                      stripped = ln.lstrip()
                      if stripped.startswith("//") or stripped.startswith("*") or stripped.startswith("/*"):
                          continue
                      violations.append(f"{p}:{i+1}: {ln.rstrip()}")
          if violations:
              print("::error::Raw Sleep() found. Use ElleServiceBase::InterruptibleSleep, ElleWait::PollingSleep(UntilSet), or WaitForSingleObject:")
              for v in violations: print("  " + v)
              sys.exit(1)
          print("ok — zero raw Sleep() in worker/service paths")
          PY

  # ──────────────────────────────────────────────────────────────────────── — locks in the "policy lives in
  # Directory.Build.props, exceptions live only in the vendored Lua
  # project" rule. If any non-vendored .vcxproj starts overriding
  # WarningLevel or TreatWarningAsError locally, the PR fails here.
  # This stops silent "let me just lower this to Level3 to quiet one
  # warning" drift — the loudest category of regression in the /WX
  # push rounds of Feb 2026.
  # ────────────────────────────────────────────────────────────────────────
  warning-policy-canary:
    name: Warning Policy Invariant Canary
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify policy is centralized
        run: |
          set -u
          exit_code=0

          echo "::group::Directory.Build.props must set policy"
          if ! grep -q '<WarningLevel>Level4</WarningLevel>' ElleAnn/Directory.Build.props; then
              echo "::error::Directory.Build.props must set WarningLevel=Level4"
              exit_code=1
          fi
          if ! grep -q '<TreatWarningAsError>true</TreatWarningAsError>' ElleAnn/Directory.Build.props; then
              echo "::error::Directory.Build.props must set TreatWarningAsError=true"
              exit_code=1
          fi
          echo "ok"
          echo "::endgroup::"

          echo "::group::No vcxproj outside vendored Lua may override policy"
          # Whitelist: Elle.Lua.Behavioral.vcxproj has per-file overrides
          # for each of the 32 vendored Lua source files. That's the ONLY
          # place a WarningLevel or TreatWarningAsError tag may appear in
          # a vcxproj.
          drift=$(grep -rn --include='*.vcxproj' \
                -E 'WarningLevel|TreatWarningAsError' ElleAnn/ \
                | grep -vE 'Elle\.Lua\.Behavioral\.vcxproj' \
                | grep -vE '^\s*$' || true)
          if [ -n "$drift" ]; then
              echo "::error::Non-vendored vcxproj overrides the central warning policy:"
              echo "$drift"
              exit_code=1
          else
              echo "ok"
          fi
          echo "::endgroup::"

          exit $exit_code

  # ────────────────────────────────────────────────────────────────────────
  # Static hygiene — sln ↔ disk, XML well-formedness.
  # ────────────────────────────────────────────────────────────────────────
  sln-integrity:
    name: Solution ↔ Filesystem Integrity
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Verify vcxproj set
        run: |
          python3 - <<'PY'
          import re, os, sys, xml.etree.ElementTree as ET
          root = 'ElleAnn'
          with open(f'{root}/ElleAnn.sln') as f:
              sln = f.read()
          referenced = set(re.findall(r'"([^"]+\.vcxproj)"', sln))
          existing = set()
          for dirpath, _, files in os.walk(root):
              for fn in files:
                  if fn.endswith('.vcxproj'):
                      rel = os.path.relpath(os.path.join(dirpath, fn), root).replace('/', '\\')
                      existing.add(rel)
          missing = referenced - existing
          extra   = existing - referenced
          bad_xml = []
          for dirpath, _, files in os.walk(root):
              for fn in files:
                  if fn.endswith('.vcxproj'):
                      try: ET.parse(os.path.join(dirpath, fn))
                      except Exception as e: bad_xml.append((fn, str(e)))
          errs = 0
          if missing:
              print('::error::Missing vcxproj files referenced by sln:')
              for m in sorted(missing): print('  ', m); errs += 1
          if extra:
              print('::warning::vcxproj files on disk but not in sln:')
              for e in sorted(extra): print('  ', e)
          if bad_xml:
              print('::error::Malformed vcxproj files:')
              for fn, e in bad_xml: print('  ', fn, e); errs += 1
          print(f'Referenced: {len(referenced)}  On disk: {len(existing)}')
          sys.exit(1 if errs else 0)
          PY

  # ────────────────────────────────────────────────────────────────────────
  # C++ brace / paren balance + ElleDB symbol table audit — string-and-
  # comment-aware. Catches half-committed refactors AND declared-but-
  # -undefined ElleDB:: functions (e.g. `GetWorkerStatuses` declared in
  # the header but missing a definition — previously a silent linker
  # break that only fired when someone actually built the HTTP service).
  # ────────────────────────────────────────────────────────────────────────
  cpp-balance:
    name: C++ Brace / Paren Balance + ElleDB Symbol Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Balance sweep
        run: |
          python3 - <<'PY'
          import os, re, sys
          def strip(src):
              out = []; i = 0; n = len(src)
              while i < n:
                  c = src[i]
                  if c == '"':
                      i += 1
                      while i < n and src[i] != '"':
                          if src[i] == '\\' and i+1 < n: i += 2
                          else: i += 1
                      i += 1
                  elif c == "'":
                      i += 1
                      while i < n and src[i] != "'":
                          if src[i] == '\\' and i+1 < n: i += 2
                          else: i += 1
                      i += 1
                  elif c == '/' and i+1 < n and src[i+1] == '/':
                      while i < n and src[i] != '\n': i += 1
                  elif c == '/' and i+1 < n and src[i+1] == '*':
                      i += 2
                      while i+1 < n and not (src[i] == '*' and src[i+1] == '/'): i += 1
                      i += 2
                  else:
                      out.append(c); i += 1
              return ''.join(out)
          bad = []
          exts = ('.cpp', '.h', '.hpp', '.cc', '.cxx')
          skip_dirs = {'Lua/lua54', 'Debug', 'Release', 'x64', '.vs'}
          skip_files = {'ElleAnn/Shared/json.hpp'}
          for dirpath, dirnames, files in os.walk('ElleAnn'):
              dirnames[:] = [d for d in dirnames if d not in skip_dirs]
              for fn in files:
                  if not fn.lower().endswith(exts): continue
                  p = os.path.join(dirpath, fn)
                  if p in skip_files: continue
                  s = strip(open(p, 'r', encoding='utf-8', errors='ignore').read())
                  if s.count('{') != s.count('}') or s.count('(') != s.count(')'):
                      bad.append((p, s.count('{'), s.count('}'), s.count('('), s.count(')')))
          if bad:
              for p, ob, cb, op, cp in bad:
                  print(f'::error file={p}::unbalanced: {{ {ob}/{cb} }} ( {op}/{cp} )')
              sys.exit(1)
          print(f'Balance OK')
          PY
      - name: ElleDB symbol audit
        run: |
          python3 - <<'PY'
          import re, sys
          hdr = open('ElleAnn/Shared/ElleSQLConn.h').read()
          m = re.search(r'namespace\s+ElleDB\s*\{(.+)', hdr, flags=re.S)
          body = m.group(1)
          decls = set()
          for mm in re.finditer(
              r'\n\s*(?:bool|uint32_t|uint64_t|int|int32_t|int64_t|void|std::string|[\w:<>]+)\s+(\w+)\s*\([^;{]*?\)\s*;',
              body, flags=re.S):
              name = mm.group(1)
              if re.match(r'^[A-Z][A-Za-z0-9_]+$', name):
                  decls.add(name)
          defs = {}
          for cpp in ('ElleSQLConn.cpp', 'ElleDB_Queues.cpp',
                      'ElleDB_Domain.cpp', 'ElleDB_Content.cpp'):
              src = open(f'ElleAnn/Shared/{cpp}').read()
              for mm in re.finditer(
                  r'\n(?:bool|uint32_t|uint64_t|int|int32_t|int64_t|void|std::string|[\w:<>]+)\s+(\w+)\s*\([^;{]*?\)\s*(?:const\s*)?\{',
                  src, flags=re.S):
                  name = mm.group(1)
                  if name in decls:
                      defs.setdefault(name, []).append(cpp)
          missing = sorted(d for d in decls if d not in defs)
          dups    = {n: f for n, f in defs.items() if len(f) > 1}
          errs = 0
          for m in missing:
              print(f'::error::ElleDB::{m} declared in ElleSQLConn.h but NEVER defined')
              errs += 1
          for n, fs in dups.items():
              print(f'::error::ElleDB::{n} defined in multiple files: {fs}')
              errs += 1
          print(f'Declared {len(decls)}, defined {len(defs)}, missing {len(missing)}, dup {len(dups)}')
          sys.exit(1 if errs else 0)
          PY

  # ────────────────────────────────────────────────────────────────────────
  # Service-name consistency — every `name` in elle_service_manifest.json
  # MUST match the string passed to `ElleServiceBase(SVC_*, "<name>", …)`
  # inside the corresponding service's .cpp. If they drift, `sc.exe start`
  # succeeds but the service process's `StartServiceCtrlDispatcher` call
  # hangs (the SCM waits for a service named whatever Install-Elle created,
  # but the exe registers under a different name). Every `depends:` entry
  # must also reference a declared service.
  # ────────────────────────────────────────────────────────────────────────
  service-name-consistency:
    name: Service Name Consistency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Audit manifest vs C++
        run: |
          python3 - <<'PY'
          import json, re, os, sys, subprocess
          m = json.load(open('ElleAnn/Deploy/elle_service_manifest.json'))
          svcs = m['services']
          names = {s['name'] for s in svcs}
          out = subprocess.check_output(
              ['grep', '-rn', ': ElleServiceBase(SVC_',
               'ElleAnn/Services/', 'ElleAnn/Lua/'], text=True)
          cpp = set()
          for ln in out.splitlines():
              mm = re.search(r':\s*ElleServiceBase\([^,]+,\s*"([^"]+)"', ln)
              if mm: cpp.add(mm.group(1))
          errs = 0
          for n in sorted(names - cpp):
              print(f'::error::Manifest declares service "{n}" but no C++ '
                    f'ElleServiceBase(..., "{n}", …) exists')
              errs += 1
          for n in sorted(cpp - names):
              print(f'::error::C++ ElleServiceBase(..., "{n}", …) has no '
                    f'manifest entry — it will never be installed by '
                    f'Install-ElleServices.ps1')
              errs += 1
          for s in svcs:
              for d in s.get('depends', []):
                  if d not in names:
                      print(f'::error::Service "{s["name"]}" depends on '
                            f'"{d}" which is not declared in the manifest')
                      errs += 1
          print(f'Manifest: {len(names)}, C++ registrations: {len(cpp)}')
          sys.exit(1 if errs else 0)
          PY

  # Catches typos, missing params, broken string interpolation before an
  # operator runs the installer.
  # ────────────────────────────────────────────────────────────────────────
  powershell-syntax:
    name: PowerShell Syntax
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v5
      - name: Parse every .ps1
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $errs = 0
          Get-ChildItem -Recurse -Filter *.ps1 -Path ElleAnn/Deploy | ForEach-Object {
            $file = $_.FullName
            $tokens = $null; $errors = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $file, [ref]$tokens, [ref]$errors) | Out-Null
            if ($errors.Count -gt 0) {
              foreach ($e in $errors) {
                Write-Host "::error file=$file,line=$($e.Extent.StartLineNumber)::$($e.Message)"
              }
              $script:errs += $errors.Count
            } else {
              Write-Host "OK  $file"
            }
          }
          if ($errs -gt 0) { exit 1 }

  # ────────────────────────────────────────────────────────────────────────
  # SQL delta idempotency — every ALTER/CREATE in SQL/ must sit inside an
  # `IF NOT EXISTS` (or equivalent) guard so re-applying a delta on a
  # live database is a no-op. Re-runnability is the contract; this test
  # pins the contract.
  #
  # Granularity: SQL Server scripts are batched on `GO`. A batch is
  # idempotent if it contains at least one IF NOT EXISTS / IF EXISTS /
  # IF COL_LENGTH / IF OBJECT_ID guard before its schema statement.
  # ────────────────────────────────────────────────────────────────────────
  sql-delta-idempotency:
    name: SQL Delta Idempotency
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Audit deltas
        run: |
          python3 - <<'PY'
          import os, re, sys
          offenders = []
          # Initial schemas apply once against an empty DB. Deltas must be
          # re-runnable.
          initial_schemas = {
            'ElleAnn_Schema.sql',
            'ElleAnn_Identity_Schema.sql',
            'ElleAnn_XChromosome_Schema.sql',
          }
          sql_dir = 'ElleAnn/SQL'
          if not os.path.isdir(sql_dir):
              print('no SQL dir'); sys.exit(0)
          guard_rx = re.compile(r'\bIF\s+(NOT\s+)?EXISTS\b|\bIF\s+COL_LENGTH\b|\bIF\s+OBJECT_ID\b',
                                re.IGNORECASE)
          schema_rx = re.compile(r'\b(ALTER\s+TABLE|CREATE\s+TABLE|CREATE\s+INDEX|CREATE\s+PROCEDURE|CREATE\s+FUNCTION|CREATE\s+VIEW|ADD\s+CONSTRAINT)\b',
                                  re.IGNORECASE)
          for fn in sorted(os.listdir(sql_dir)):
              if not fn.endswith('.sql'): continue
              if fn in initial_schemas: continue
              path = os.path.join(sql_dir, fn)
              txt = open(path).read()
              # Split on GO lines — standard SQL Server batch delimiter.
              batches = re.split(r'^\s*GO\s*$', txt, flags=re.IGNORECASE | re.MULTILINE)
              line_cursor = 1
              for batch in batches:
                  schema_stmt = schema_rx.search(batch)
                  if schema_stmt:
                      if not guard_rx.search(batch):
                          # Compute the real line number.
                          rel_line = batch.count('\n', 0, schema_stmt.start())
                          offenders.append(
                              f'{path}:{line_cursor + rel_line} '
                              f'{schema_stmt.group(0).upper()} batch has no '
                              f'IF [NOT] EXISTS / COL_LENGTH / OBJECT_ID guard')
                  line_cursor += batch.count('\n') + 1   # +1 for the GO
          if offenders:
              for o in offenders: print(f'::error::{o}')
              sys.exit(1)
          print('All deltas idempotent.')
          PY

  # ────────────────────────────────────────────────────────────────────────
  # SQL schema end-to-end coherence.
  #
  # We cannot stand up SQL Server in a pure-compile ubuntu job, but we CAN
  # statically prove three properties that together are the next best
  # thing to `sqlcmd -i`-ing the whole delta chain:
  #
  #   1. Every ALTER TABLE <schema>.<name> in a delta refers to a table
  #      actually defined in one of the initial schemas. A typo here
  #      would crash SSMS on first apply.
  #   2. Every ADD <column> in an ALTER TABLE is guarded by an existence
  #      check on that exact column (COL_LENGTH / sys.columns), so a
  #      re-run on a database where the column already exists is a no-op.
  #   3. Every initial schema is self-contained: no ALTER TABLE whose
  #      target isn't declared in the same file, AND each CREATE TABLE
  #      has a matching IF NOT EXISTS / OBJECT_ID guard or sits inside
  #      a `CREATE DATABASE` bootstrap section.
  #
  # Property 2 is checked at batch granularity (`GO`), per delta file,
  # with a diagnostic that names the file, line, table, and column.
  # ────────────────────────────────────────────────────────────────────────
  sql-schema-e2e:
    name: SQL Schema End-to-End Coherence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Audit schema graph
        run: |
          python3 - <<'PY'
          import os, re, sys
          sql_dir = 'ElleAnn/SQL'
          initial_schemas = [
              'ElleAnn_Schema.sql',
              'ElleAnn_Identity_Schema.sql',
              'ElleAnn_XChromosome_Schema.sql',
          ]
          delta_order = [
              'ElleAnn_MemoryDelta.sql',
              'ElleAnn_QueueReaperDelta.sql',
          ]

          # Collect every table defined in initial schemas.
          create_tbl_rx = re.compile(
              r'\bCREATE\s+TABLE\s+(?:\[?dbo\]?\.)?\[?([A-Za-z_][\w]*)\]?',
              re.IGNORECASE)
          alter_add_col_rx = re.compile(
              r'\bALTER\s+TABLE\s+(?:\[?dbo\]?\.)?\[?([A-Za-z_][\w]*)\]?\s+ADD\s+'
              r'\[?([A-Za-z_][\w]*)\]?',
              re.IGNORECASE)
          alter_tbl_rx = re.compile(
              r'\bALTER\s+TABLE\s+(?:\[?dbo\]?\.)?\[?([A-Za-z_][\w]*)\]?',
              re.IGNORECASE)

          known_tables: set[str] = set()
          for fn in initial_schemas:
              path = os.path.join(sql_dir, fn)
              if not os.path.isfile(path):
                  print(f'::error::initial schema missing: {path}')
                  sys.exit(2)
              txt = open(path).read()
              for m in create_tbl_rx.finditer(txt):
                  known_tables.add(m.group(1).lower())
          print(f'Initial schema defines {len(known_tables)} tables')

          errs = 0

          def col_guarded(batch: str, tbl: str, col: str) -> bool:
              """Does this batch guard the ADD <col> with a column-existence check?"""
              # Accept either COL_LENGTH('dbo.Tbl','Col') or a sys.columns
              # subquery that references both the object and column names.
              col_len_rx = re.compile(
                  r"COL_LENGTH\s*\(\s*N?'[^']*\b" + re.escape(tbl) +
                  r"\b[^']*'\s*,\s*N?'" + re.escape(col) + r"'\s*\)",
                  re.IGNORECASE)
              sys_col_rx = re.compile(
                  r"sys\.columns[\s\S]*?\bname\s*=\s*N?'" + re.escape(col) + r"'"
                  r"[\s\S]*?OBJECT_ID\s*\(\s*N?'[^']*\b" + re.escape(tbl) + r"\b",
                  re.IGNORECASE)
              # Allow either ordering of the conjuncts.
              sys_col_rx2 = re.compile(
                  r"OBJECT_ID\s*\(\s*N?'[^']*\b" + re.escape(tbl) + r"\b[\s\S]*?"
                  r"\bname\s*=\s*N?'" + re.escape(col) + r"'",
                  re.IGNORECASE)
              return bool(col_len_rx.search(batch) or sys_col_rx.search(batch)
                          or sys_col_rx2.search(batch))

          # Audit every delta.
          for fn in delta_order:
              path = os.path.join(sql_dir, fn)
              if not os.path.isfile(path):
                  print(f'::error::listed delta missing: {path}')
                  errs += 1
                  continue
              txt = open(path).read()
              batches = re.split(r'^\s*GO\s*$', txt,
                                  flags=re.IGNORECASE | re.MULTILINE)
              line_cursor = 1
              for batch in batches:
                  # 1. ALTER TABLE target must be known.
                  for m in alter_tbl_rx.finditer(batch):
                      tbl = m.group(1).lower()
                      if tbl not in known_tables:
                          rel = batch.count('\n', 0, m.start())
                          print(f'::error file={path},line={line_cursor + rel}'
                                f'::ALTER TABLE target "{tbl}" is not declared '
                                f'in any initial schema')
                          errs += 1
                  # 2. Every ADD <column> needs a column-level guard.
                  for m in alter_add_col_rx.finditer(batch):
                      tbl, col = m.group(1), m.group(2)
                      # "ADD CONSTRAINT" is a different statement, skip.
                      if col.upper() == 'CONSTRAINT':
                          continue
                      if not col_guarded(batch, tbl, col):
                          rel = batch.count('\n', 0, m.start())
                          print(f'::error file={path},line={line_cursor + rel}'
                                f'::ALTER TABLE {tbl} ADD {col} has no '
                                f'COL_LENGTH / sys.columns guard -- '
                                f'non-idempotent')
                          errs += 1
                  line_cursor += batch.count('\n') + 1

          # Also flag any ALTER TABLE in initial schemas that targets an
          # unknown table (self-contained rule).
          for fn in initial_schemas:
              path = os.path.join(sql_dir, fn)
              txt = open(path).read()
              for m in alter_tbl_rx.finditer(txt):
                  tbl = m.group(1).lower()
                  if tbl not in known_tables:
                      ln = txt.count('\n', 0, m.start()) + 1
                      print(f'::error file={path},line={ln}'
                            f'::initial schema ALTERs unknown table "{tbl}"')
                      errs += 1

          if errs:
              print(f'{errs} schema coherence problem(s) found')
              sys.exit(1)
          print('Schema graph coherent: all ALTERs target known tables, '
                'all ADD columns are guarded.')
          PY

  # ────────────────────────────────────────────────────────────────────────
  # cppcheck static analysis.
  #
  # Catches a different class of bug than MSBuild warnings: uninitialised
  # reads, null-deref, signed-vs-unsigned compares, useless self-
  # assignments, dead code, API misuse. Runs as a separate ubuntu job
  # (cppcheck on Windows runners is flaky and 10x slower).
  #
  # Settings:
  #   --enable=warning,performance,portability -- no `style` noise, no
  #   `information` chatter. The first three cover real defects.
  #   --error-exitcode=1 promotes any finding to a job failure.
  #   --suppress patterns limit the noise in the handful of areas where
  #   the codebase deliberately takes a reinterpret_cast shortcut.
  #   -I Shared teaches cppcheck where the common headers live.
  #   --inline-suppr lets us narrowly silence findings at the call site
  #   with `// cppcheck-suppress <id>` when there's a real reason.
  # ────────────────────────────────────────────────────────────────────────
  cppcheck:
    name: C++ Static Analysis (cppcheck)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Install cppcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y cppcheck
          cppcheck --version
      - name: Run cppcheck
        run: |
          cppcheck \
            --enable=warning,performance,portability \
            --inline-suppr \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unknownMacro \
            --suppress=preprocessorErrorDirective \
            --suppress=internalAstError \
            --suppress=ConfigurationNotChecked \
            --suppress=memsetClassFloat \
            --suppress=invalidPointerCast \
            --suppress='*:ElleAnn/Shared/json.hpp' \
            --suppress='*:ElleAnn/Lua/lua54/*' \
            -I ElleAnn/Shared \
            -I ElleAnn/Services \
            --std=c++17 \
            --platform=win64 \
            -j 2 \
            ElleAnn/Shared \
            ElleAnn/Services \
            ElleAnn/Lua/Elle.Lua.Behavioral

